{% extends "base.html" %}
{% block title %}Expense Category Analysis{% endblock %}
{% block content %}

<div class="container py-5">

  <!-- Animated Heading -->
  <h3 class="fw-bold mb-4 text-gradient fade-in-down">
    📊 Expense Category Analysis
  </h3>

  <!-- Premium Card -->
  <div class="card shadow-lg border-0 rounded-4 hover-scale fade-in-up">
    <div class="card-body text-center p-4">

      <h5 class="fw-bold mb-3 text-primary fade-in">
        Monthly Expense by Category
      </h5>

      <!-- Chart with smooth hover effect -->
      <form method="get" class="row g-2 justify-content-center mb-4">

        <div class="col-auto">
          <select name="month" class="form-select">
            {% for m,val in months %}
              <option value="{{ m }}"
                {% if m == current_month %}selected{% endif %}>
                {{ val }}
              </option>
            {% endfor %}
          </select>
        </div>

        <div class="col-auto">
          <select name="year" class="form-select">
            {% for y in "2023,2024,2025,2026".split(",") %}
              <option value="{{ y }}"
                {% if y|int == current_year %}selected{% endif %}>
                {{ y }}
              </option>
            {% endfor %}
          </select>
        </div>

        <div class="col-auto">
          <button class="btn btn-primary">
            🔄 Update
          </button>
        </div>

      </form>

      <img
        src="{% url 'transactions:expense_category_chart' %}?month={{ request.GET.month|default:current_month }}&year={{ request.GET.year|default:current_year }}"
        alt="Expense Category Chart"
        class="img-fluid rounded shadow"
        style="max-height:420px"
      />

      <p class="text-muted mt-3 mb-0 fade-in">
        This chart represents how your expenses are distributed
        across categories for the current month.
      </p>

      <!-- Export Button -->
      <a href="{% url 'transactions:expense_category_chart' %}?month={{ request.GET.month|default:current_month }}&year={{ request.GET.year|default:current_year }}&download=1" 
         class="btn btn-primary shadow-sm">
        ⬇️ Download Chart as PNG
      </a>

    </div>
  </div>

</div>

<!-- Custom Premium Animations -->
<style>
  /* Gradient text */
  .text-gradient {
    background: linear-gradient(90deg, #007bff, #6610f2);
    -webkit-background-clip: text;   /* Chrome, Safari */
    -webkit-text-fill-color: transparent;
    color: transparent;              /* fallback */
    display: inline-block;           /* ensures gradient applies properly */
  }

  /* Fade-in animations */
  .fade-in { animation: fadeIn 1.2s ease forwards; opacity: 0; }
  .fade-in-up { animation: fadeInUp 1.2s ease forwards; opacity: 0; }
  .fade-in-down { animation: fadeInDown 1.2s ease forwards; opacity: 0; }

  @keyframes fadeIn { from {opacity:0;} to {opacity:1;} }
  @keyframes fadeInUp { from {opacity:0; transform:translateY(20px);} to {opacity:1; transform:translateY(0);} }
  @keyframes fadeInDown { from {opacity:0; transform:translateY(-20px);} to {opacity:1; transform:translateY(0);} }

  /* Hover effects */
  .hover-scale:hover { transform: scale(1.02); transition: transform 0.3s ease; }
  .hover-glow:hover { box-shadow: 0 0 20px rgba(0,123,255,0.5); transform: scale(1.03); }
</style>

{% endblock %}
